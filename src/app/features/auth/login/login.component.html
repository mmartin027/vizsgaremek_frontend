<app-header></app-header>

<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="container d-flex justify-content-center px-3">
    
    <div class="card login-card border-0 shadow-lg p-4 p-md-5">
      
      <h2 class="text-center fw-bold mb-4 login-title">BEJELENTKEZÉS</h2>

      <div class="text-center mb-4">
        <button type="button" class="btn btn-google rounded-circle shadow-sm" (click)="continueWithGoogle()">
          <span class="fw-bold fs-4 google-text">G</span>
        </button>
      </div>

      <p class="text-center text-muted mb-4 small">Vagy használja az e-mail fiókját:</p>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        
        <div class="mb-3">
          <input type="text" formControlName="username" class="form-control custom-input" placeholder="Felhasználónév">
        </div>
        
        <div class="mb-3">
          <input type="password" formControlName="password" class="form-control custom-input" placeholder="Jelszó">
        </div>

        <div class="text-end mb-4">
          <a routerLink="/forgot-password" class="text-muted text-decoration-none small forgot-link">
            Elfelejtette a jelszavát?
          </a>
        </div>

        <button type="submit" class="btn w-100 btn-primary-custom rounded-pill py-3 fw-bold mb-4" [disabled]="isLoading">
          <span *ngIf="!isLoading">Bejelentkezés</span>
          <span *ngIf="isLoading">Bejelentkezés folyamatban...</span>
          Bejelentkezés
        </button>

        <div class="text-center">
          <span class="text-muted small">Nincs még fiókja? </span>
          <a routerLink="/register" class="fw-bold text-decoration-none register-link">Regisztráció</a>
        </div>
      </form>

    </div>
  </div>
</div>
