<div class="register-wrapper">
  <div class="left-panel">
    <img src="assets/Image-Parkolo-felulnezet.png" alt="Parkoló felülnézet" class="bg-image">
    <div class="overlay-content">
      <h2 class="logo-text">ParkEasy</h2>
      <h1>Csatlakozzon hozzánk</h1>
      <p>A kapcsolat fenntartásához kérjük,<br>jelentkezzen be személyes<br>adataival</p>
      <button routerLink="/login" class="ghost-btn">Bejelentkezés</button>
    </div>
  </div>
 
  <div class="right-panel">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="google-button">
        
      </div>
 
      <h2 class="form-title">REGISZTRÁCIÓ</h2>
      <button type="button" (click)="continueWithGoogle()" class="google-btn">
          <img src="assets/google-icon-logo-symbol-free-png.png" alt="Google">
        </button>
      <p class="form-subtitle">Vagy használja az e-mail fiókját:</p>
 
      <input type="text" formControlName="username" placeholder="Felhasználónév">
      <input type="text" formControlName="firstName" placeholder="Keresztnév">
      <input type="text" formControlName="lastName" placeholder="Vezetéknév">
      <input type="text" formControlName="phone" placeholder="Telefon">
      <input type="email" id="email" formControlName="email" placeholder="E-mail">
      <input type="password" id="password" formControlName="password" placeholder="Jelszó">
      <input type="password" id="passwordagain" formControlName="password_again" placeholder="Jelszó mégegyszer">
 
      <button class="sign-in-button" type="submit">REGISZTRÁCIÓ</button>
 
      <div class="mobile-login-link">
        <p>Már van fiókja? <a routerLink="/login">Bejelentkezés</a></p>
      </div>
    </form>
  </div>
</div>
