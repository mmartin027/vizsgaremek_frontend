<div class="row align-items-center">
  <div class="col-12 col-lg-5 mb-4 mb-lg-0">
    <h2 class="fw-bold mb-3">Kérdése van még?</h2>
    <p class="text-muted mb-4">
      Nem találta meg amit keresett? Nézze meg a gyakran ismételt kérdéseket vagy vegye fel velünk a kapcsolatot, és segítünk!
    </p>
    
    <button class="btn btn-info text-white rounded-pill px-4 py-2" 
            style="background-color: #26B9D1; border: none;" 
            routerLink="/kapcsolat">
      Kapcsolat
    </button>
    
  </div>

  <div class="col-12 col-lg-7">
    <div class="accordion border-0" id="faqAccordion">
      
      <div class="accordion-item border-0 mb-3 shadow-sm rounded-3 overflow-hidden" *ngFor="let item of faqItems; let i = index">
        
        <h2 class="accordion-header">
          <button class="accordion-button fw-bold py-3" 
                  type="button" 
                  [class.collapsed]="openIndex !== i"
                  (click)="toggleFaq(i)">
            {{ item.question }}
          </button>
        </h2>

        <div class="accordion-collapse collapse" [class.show]="openIndex === i">
          <div class="accordion-body bg-white text-muted">
            {{ item.answer }}
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
