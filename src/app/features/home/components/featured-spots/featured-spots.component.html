<section class="featured-section">
  <div class="container py-4">
    <div class="text-center mb-5">
      <h2 class="fw-bold" style="color: #333;">Kiemelt Parkolóink</h2>
      <p class="text-muted">A legnépszerűbb és legkényelmesebb parkolóhelyek felhasználóink szerint.</p>
    </div>

    <div class="featured-grid">
      <app-parking-card 
        *ngFor="let spot of spots" 
        [spot]="spot" 
        (viewDetails)="onViewDetails($event)">
      </app-parking-card>
    </div>
  </div>
</section>
