<div class="foglalotomb">
  <h2>Foglaljon parkolóhelyet!</h2>
  <p>Adja meg az adatokat a foglaláshoz</p>

  <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
    
    <div class="input-group" style="position: relative;"> <label>Város</label>
      <input type="text" formControlName="city" placeholder="Hová utazik?" 
             (focus)="showCities = true" 
             (blur)="hideCitiesDelayed()">

      <ul *ngIf="showCities" class="cities-dropdown" style="position: absolute; top: 100%; left: 0; width: 100%; background: white; list-style: none; margin: 0; padding: 0; border: 1px solid #ccc; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <li *ngFor="let city of cities" (click)="selectCity(city)" style="padding: 10px; cursor: pointer; border-bottom: 1px solid #eee;">
          {{ city }}
        </li>
      </ul>
    </div>

    <label>Kezdő dátum</label>
    <div class="kezdodatum">
      <input type="date" formControlName="startDate">
    </div>

    <label>Kezdő időpont</label>
    <div class="kezdoido">
      <input type="time" formControlName="startTime">
    </div>

    <label>Befejező dátum</label>
    <div class="befejezodatum">
      <input type="date" formControlName="endDate">
    </div>

    <label>Befejező időpont</label>
    <div class="befejezoido">
      <input type="time" formControlName="endTime">
    </div>

    <button type="submit" class="search-btn">Parkolókeresés</button>

  </form>
</div>
