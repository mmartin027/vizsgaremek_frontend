<div class="container py-4 quick-action-container booking-panel">
  
 

  <div class="row g-3">
    <div class="col-12">
      <div class="card h-100 action-card border-0 shadow-sm rounded-4" (click)="navigateToMap('OUTDOOR')">
        <div class="card-body d-flex align-items-center p-4">
          <div class="card-icon me-4">
            <i class="bi bi-car-front-fill fs-1"></i>
          </div>
          <div class="flex-grow-1">
            <h5 class="fw-bold mb-1">UTCAI PARKOLÁS</h5>
            <p class="text-muted mb-0 small">Keresés a nyílt zónákban</p>
          </div>
          <div class="text-muted">
            <i class="bi bi-chevron-right fs-4"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="card h-100 action-card border-0 shadow-sm rounded-4" (click)="navigateToMap('covered')">
        <div class="card-body d-flex align-items-center p-4">
          <div class="card-icon me-4">
            <i class="bi bi-p-square-fill fs-1"></i>
          </div>
          <div class="flex-grow-1">
            <h5 class="fw-bold mb-1">ZÁRT HELYI PARKOLÁS</h5>
            <p class="text-muted mb-0 small">Garázsok és parkolóházak</p>
          </div>
          <div class="text-muted">
            <i class="bi bi-chevron-right fs-4"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
