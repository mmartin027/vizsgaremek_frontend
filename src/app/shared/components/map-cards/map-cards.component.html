<div class="map-sidebar-card" *ngIf="spot" (click)="onCardClick()" style="cursor: pointer;">
  
  <div class="card-top-row">
    <div class="spot-icon-wrapper">
      <img [src]="spot.main_Image_Url || spot.main_Image_Url || 'assets/no-image-parking.jpg'" class="spot-icon">
    </div>

    <div class="spot-info">
      <h3 class="spot-name">{{ spot.name }}</h3>
      <p class="spot-address">{{ spot.address || 'Cím nem elérhető' }}</p>
    </div>

    <div class="spot-price-col">
      <span class="price-value">{{ spot.hourlyRate }} Ft</span>
      <span class="price-unit">/ óra</span>
    </div>
  </div>

  <div class="spot-features">
    <div class="feature-badges" *ngIf="featureList.length > 0">
      <span class="badge badge-info me-1" *ngFor="let feature of featureList">
        {{ feature }}
      </span>
    </div>
  </div>

  <button class="spot-book-btn" (click)="onButtonClick($event)">
    Részletek & Foglalás
  </button>
</div>
